<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trickbit Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}
body{
    min-height:100vh;
    background:#fffaf1;
    color:#111;
    padding:32px 20px;
}
.site-wrap{
    width:min(920px, 100%);
    margin:0 auto;
}
header{
    position:relative;
    z-index:0;
    text-align:center;
    margin-bottom:34px;
    padding:38px 20px 24px;
}
header::before,
header::after,
.paint-splatters::before,
.paint-splatters::after,
.paint-splatters-extra::before,
.paint-splatters-extra::after{
    content:"";
    position:absolute;
    z-index:-1;
}
header::before{
    width:170px;
    height:52px;
    left:50%;
    top:16px;
    transform:translateX(-118%) rotate(-7deg);
    background:#ffd15c;
    border-radius:62% 38% 44% 56% / 48% 46% 54% 52%;
}
header::after{
    width:142px;
    height:48px;
    right:50%;
    bottom:4px;
    transform:translateX(112%) rotate(6deg);
    background:#69d2e7;
    border-radius:42% 58% 61% 39% / 52% 42% 58% 48%;
}
.paint-splatters,
.paint-splatters-extra{
    position:absolute;
    inset:0;
    z-index:-1;
    pointer-events:none;
}
.paint-splatters::before{
    width:18px;
    height:18px;
    left:14%;
    top:2px;
    background:#ff5da2;
    border-radius:50%;
    box-shadow:
        34px 18px 0 -8px #ff5da2,
        66px 2px 0 -10px #ffd15c,
        96px 38px 0 -6px #59d98e,
        134px 18px 0 -9px #69d2e7,
        176px 54px 0 -7px #ff5da2,
        222px 24px 0 -10px #ffd15c,
        -26px 48px 0 -6px #59d98e,
        -62px 24px 0 -10px #ffd15c,
        -86px 78px 0 -7px #69d2e7,
        20px 86px 0 -9px #ff5da2,
        78px 102px 0 -11px #69d2e7,
        150px 92px 0 -8px #59d98e;
}
.paint-splatters::after{
    width:16px;
    height:16px;
    right:14%;
    top:6px;
    background:#59d98e;
    border-radius:50%;
    box-shadow:
        -30px 28px 0 -6px #ffd15c,
        -66px 10px 0 -9px #69d2e7,
        -102px 48px 0 -7px #ff5da2,
        -146px 24px 0 -9px #59d98e,
        -190px 66px 0 -8px #ffd15c,
        -238px 34px 0 -10px #69d2e7,
        22px 52px 0 -8px #69d2e7,
        58px 32px 0 -9px #ff5da2,
        84px 78px 0 -7px #ffd15c,
        -18px 92px 0 -9px #59d98e,
        -86px 110px 0 -10px #ff5da2,
        -158px 98px 0 -8px #69d2e7;
}
.paint-splatters-extra::before{
    width:8px;
    height:8px;
    left:28%;
    top:2px;
    background:#111;
    border-radius:50%;
    box-shadow:
        -38px 34px 0 1px #ffd15c,
        20px 26px 0 3px #69d2e7,
        58px 58px 0 0 #ff5da2,
        104px 8px 0 2px #59d98e,
        142px 44px 0 -1px #111,
        184px 78px 0 2px #ffd15c,
        -92px 82px 0 2px #ff5da2,
        -132px 54px 0 0 #69d2e7;
}
.paint-splatters-extra::after{
    width:7px;
    height:7px;
    right:28%;
    top:8px;
    background:#111;
    border-radius:50%;
    box-shadow:
        36px 38px 0 2px #ff5da2,
        -18px 30px 0 4px #ffd15c,
        -58px 62px 0 0 #59d98e,
        -112px 10px 0 2px #69d2e7,
        -150px 46px 0 -1px #111,
        -196px 84px 0 3px #ff5da2,
        94px 76px 0 2px #69d2e7,
        138px 48px 0 0 #ffd15c;
}
h1{
    font-size:4.5rem;
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0;
    line-height:.9;
    color:#111;
}
.subtitle{
    font-size:1.75rem;
    font-family:'Bebas Neue', sans-serif;
    line-height:1.1;
    margin-top:8px;
    color:#5c6370;
}
.back-link{
    border:2px solid #111;
    border-radius:6px;
    background:white;
    box-shadow:3px 3px 0 #111;
    color:#111;
    display:inline-block;
    font-size:1rem;
    font-weight:600;
    margin-bottom:22px;
    padding:10px 14px;
    text-decoration:none;
}
.back-link:hover{
    transform:translate(1px, 1px);
    box-shadow:2px 2px 0 #111;
}
.detail-card{
    background:white;
    border:3px solid #111;
    border-radius:8px;
    box-shadow:8px 8px 0 #111;
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:24px;
    padding:22px;
}
.gallery-main{
    aspect-ratio:1 / 1;
    border:3px solid #111;
    border-radius:6px;
}
.gallery-thumbs{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin-top:12px;
}
.gallery-thumb{
    aspect-ratio:1 / 1;
    border:2px solid #111;
    border-radius:6px;
    cursor:pointer;
}
.gallery-thumb.active{
    box-shadow:0 0 0 4px #ff5da2;
}
.detail-info{
    align-self:center;
}
.detail-type{
    color:#717987;
    font-size:.9rem;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
}
.detail-name{
    font-family:'Bebas Neue', sans-serif;
    font-size:3.2rem;
    line-height:.95;
    margin-top:8px;
}
.detail-price{
    font-size:1.5rem;
    font-weight:600;
    margin-top:16px;
}
.buy-button{
    background:#ff5da2;
    border:2px solid #111;
    border-radius:6px;
    box-shadow:3px 3px 0 #111;
    color:#111;
    display:block;
    font-size:1rem;
    font-weight:600;
    margin-top:15px;
    padding:12px;
    text-align:center;
    text-decoration:none;
    width:100%;
}
.buy-button:hover{
    transform:translate(1px, 1px);
    box-shadow:2px 2px 0 #111;
}
footer{
    color:#717987;
    font-size:.9rem;
    margin-top:32px;
    text-align:center;
}
@media (max-width:560px){
    body{
        padding:24px 14px;
    }
    header{
        padding:32px 6px 20px;
    }
    header::before{
        width:122px;
        height:42px;
        transform:translateX(-105%) rotate(-7deg);
    }
    header::after{
        width:108px;
        height:38px;
        transform:translateX(104%) rotate(6deg);
    }
    .paint-splatters::before{
        left:6%;
    }
    .paint-splatters::after{
        right:6%;
    }
    .paint-splatters-extra::before{
        left:20%;
    }
    .paint-splatters-extra::after{
        right:20%;
    }
    h1{
        font-size:3.4rem;
    }
    .detail-card{
        grid-template-columns:1fr;
        gap:18px;
        padding:14px;
    }
    .detail-name{
        font-size:2.5rem;
    }
}
</style>
</head>
<body>
    <main class="site-wrap">
        <header>
            <span class="paint-splatters" aria-hidden="true"></span>
            <span class="paint-splatters-extra" aria-hidden="true"></span>
            <div>
                <h1>Trickbit</h1>
                <p class="subtitle">We sell custom made skateboards, wheels and more. If you see something you like, please click buy now and you will be taken to Ebay to checkout. Enjoy!</p>
            </div>
        </header>

        <a class="back-link" href="index.html">Back to products</a>

        <article class="detail-card">
            <div>
                <div class="gallery-main" id="gallery-main"></div>
                <div class="gallery-thumbs" id="gallery-thumbs"></div>
            </div>
            <div class="detail-info">
                <p class="detail-type" id="detail-type"></p>
                <h2 class="detail-name" id="detail-name"></h2>
                <p class="detail-price" id="detail-price"></p>
                <a class="buy-button" id="detail-buy" href="https://www.ebay.com">Buy Now on eBay</a>
            </div>
        </article>

        <footer>Made by HDM</footer>
    </main>

    <script>
    const products = {
        "street-deck": {
            type: "Skateboard",
            name: "Street Deck Custom",
            price: "£49.00",
            ebay: "https://www.ebay.com",
            images: ["#6fb6ff", "#69d2e7", "#ffd15c", "#ff5da2"]
        },
        "sticker-pack": {
            type: "Bike",
            name: "Frame Sticker Pack",
            price: "£12.00",
            ebay: "https://www.ebay.com",
            images: ["#59d98e", "#ffd15c", "#6fb6ff", "#ff7676"]
        },
        "grip-tape": {
            type: "Accessories",
            name: "Grip Tape Design",
            price: "£9.00",
            ebay: "https://www.ebay.com",
            images: ["#ff7676", "#ff5da2", "#111111", "#69d2e7"]
        },
        "mini-cruiser": {
            type: "Skateboard",
            name: "Mini Cruiser Deck",
            price: "£39.00",
            ebay: "https://www.ebay.com",
            images: ["#ffd15c", "#59d98e", "#ff7676", "#6fb6ff"]
        }
    };

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("product") || "street-deck";
    const product = products[productId] || products["street-deck"];
    const galleryMain = document.querySelector("#gallery-main");
    const galleryThumbs = document.querySelector("#gallery-thumbs");

    document.title = `${product.name} | Trickbit`;
    document.querySelector("#detail-type").textContent = product.type;
    document.querySelector("#detail-name").textContent = product.name;
    document.querySelector("#detail-price").textContent = product.price;
    document.querySelector("#detail-buy").href = product.ebay;

    function setActiveImage(color, activeThumb) {
        galleryMain.style.background = color;
        document.querySelectorAll(".gallery-thumb").forEach((thumb) => {
            thumb.classList.remove("active");
        });
        activeThumb.classList.add("active");
    }

    product.images.forEach((color, index) => {
        const thumb = document.createElement("button");
        thumb.className = "gallery-thumb";
        thumb.type = "button";
        thumb.style.background = color;
        thumb.setAttribute("aria-label", `${product.name} image ${index + 1}`);
        thumb.addEventListener("click", () => setActiveImage(color, thumb));
        galleryThumbs.appendChild(thumb);
        if (index === 0) {
            setActiveImage(color, thumb);
        }
    });
    </script>
</body>
</html>
