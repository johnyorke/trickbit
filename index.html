<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trickbit 🛹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}
body{
    min-height:100vh;
    background:white;
    color:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
}
.header-box{
    background:white;
    border-radius:20px;
    padding:30px 50px;
    text-align:center;
    width:fit-content;
    min-width:320px;
    margin-bottom:40px;
}
h1{
    font-size:4rem;
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.05em;
    color:#111;
}
.subtitle{
    font-size:1.4rem;
    margin-top:8px;
    color:#444;
}
.skateboard-img{
    width:auto;
    max-height:600px;
    display:block;
    margin:0 auto;
}
.products{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1100px;
    width:100%;
    margin-top:40px;
}
.card{
    background:white;
    border-radius:20px;
    padding:20px;
}
.image-box{
    height:220px;
    border:2px dashed #ccc;
    border-radius:14px;
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
}
.image-box span{
    opacity:.5;
}
.price{
    font-size:1.5rem;
    font-weight:600;
    margin-top:10px;
}
button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#5f73ff;
    color:white;
    font-size:1rem;
    font-family:'Inter', sans-serif;
}
button:hover{
    opacity:.9;
}
</style>
</head>
<body>
    <div class="header-box">
        <h1>Trickbit</h1>
        <p class="subtitle">Custom skateboards, bikes and more</p>
    </div>
    <img src="assets/holding-skateboard.png" class="skateboard-img" alt="Trickbit skateboard">
    <footer>Made by HDM</footer>
</body>
</html>
