<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate Supply 🛹</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-image: url("C61CC959-55E9-496D-BA39-FE4F2D242459.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height:100vh;
    color:white;
}

.overlay{
    background: rgba(0,0,0,0.25);
    min-height:100vh;
    padding:40px;
}

header{
    text-align:center;
    margin-bottom:40px;
}

h1{
    font-size:3rem;
}

.subtitle{
    opacity:0.9;
}

.products{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    max-width:1100px;
    margin:auto;
}

.card{
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    border-radius:20px;
    padding:20px;
}

.image-box{
    height:220px;
    border:2px dashed rgba(255,255,255,.5);
    border-radius:14px;

    /* CHANGE IMAGE HERE */
    background-image:url("");
    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
    justify-content:center;
}

.image-box span{
    opacity:.7;
}

.price{
    font-size:1.5rem;
    margin-top:10px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#5f73ff;
    color:white;
    font-size:1rem;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="overlay">

<header>
<h1>SKATE SUPPLY 🛹</h1>
<p class="subtitle">Pick your next board</p>
</header>

<div class="products">

<div class="card">
<div class="image-box">
<span>Put skateboard image here</span>
</div>

<h2>Street Deck</h2>

<!-- CHANGE PRICE -->
<div class="price">$79</div>

<button>Buy Now</button>
</div>


<div class="card">
<div class="image-box">
<span>Put skateboard image here</span>
</div>

<h2>Cruiser Board</h2>

<!-- CHANGE PRICE -->
<div class="price">$99</div>

<button>Buy Now</button>
</div>


<div class="card">
<div class="image-box">
<span>Put skateboard image here</span>
</div>

<h2>Pro Series</h2>

<!-- CHANGE PRICE -->
<div class="price">$149</div>

<button>Buy Now</button>
</div>

</div>

</div>

</body>
</html>
